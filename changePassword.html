<!-- changePassword.html — Parolni o'zgartirish sahifasi -->
<div class="flex-between wrap mb-16">
  <div><div class="page-title">Parolni o'zgartirish</div>
    <div class="page-subtitle">Xavfsizlik uchun kuchli parol tanlang</div></div>
  <button class="btn" onclick="App.navigate('dashboard')"><span class="material-icons">arrow_back</span> Orqaga</button>
</div>

<div class="card" style="max-width:480px;">
  <form id="changePwForm" onsubmit="return Profile.submitChangePassword(event)">
    <div class="field">
      <label>Joriy parol</label>
      <div class="input-wrap">
        <input type="password" class="input" id="cpOld" autocomplete="current-password" required>
        <button type="button" class="input-eye" onclick="App.togglePassword('cpOld', this)"><span class="material-icons">visibility</span></button>
      </div>
    </div>
    <div class="field">
      <label>Yangi parol</label>
      <div class="input-wrap">
        <input type="password" class="input" id="cpNew" autocomplete="new-password" required
          oninput="Profile.checkStrength(this.value)">
        <button type="button" class="input-eye" onclick="App.togglePassword('cpNew', this)"><span class="material-icons">visibility</span></button>
      </div>
      <div class="progress-bar mt-16" style="margin-top:8px;"><div class="progress-fill" id="pwStrength" style="width:0%"></div></div>
      <small style="color:var(--text-secondary);">Kamida 8 belgi, harf va raqam.</small>
    </div>
    <div class="field">
      <label>Yangi parolni tasdiqlang</label>
      <div class="input-wrap">
        <input type="password" class="input" id="cpConfirm" autocomplete="new-password" required>
        <button type="button" class="input-eye" onclick="App.togglePassword('cpConfirm', this)"><span class="material-icons">visibility</span></button>
      </div>
    </div>

    <div id="cpError" class="hidden" style="background:var(--md-danger); color:#fff;
      padding:10px 14px; border-radius:8px; margin-bottom:16px; font-size:13px;"></div>

    <button type="submit" class="btn btn-primary btn-block">
      <span class="material-icons">save</span> Saqlash</button>
  </form>
</div>
