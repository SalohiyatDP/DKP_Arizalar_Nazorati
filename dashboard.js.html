<!-- dashboard.js.html — Dashboard va boshqa view'lar logikasi -->
<script>
/* ===================== GOOGLE CHARTS TAYYORLASH ===================== */
var ChartsReady = new Promise(function (resolve) {
  if (window.google && google.charts) {
    google.charts.load('current', { packages: ['corechart', 'bar'] });
    google.charts.setOnLoadCallback(resolve);
  } else { resolve(); }
});

/** Joriy mavzu uchun grafik ranglari. */
function chartTheme() {
  var dark = document.documentElement.getAttribute('data-theme') === 'dark';
  return {
    backgroundColor: 'transparent',
    legend: { textStyle: { color: dark ? '#e8eaed' : '#5f6368' } },
    titleTextStyle: { color: dark ? '#e8eaed' : '#202124' },
    hAxis: { textStyle: { color: dark ? '#9aa0a6' : '#5f6368' }, gridlines: { color: dark ? '#3c4043' : '#e8eaed' } },
    vAxis: { textStyle: { color: dark ? '#9aa0a6' : '#5f6368' }, gridlines: { color: dark ? '#3c4043' : '#e8eaed' } },
    chartArea: { width: '85%', height: '75%' }
  };
}

/* ============================== DASH ================================= */
var Dash = {};
Dash._data = null;

Dash.load = function (force) {
  App.progress(30);
  var kpi = document.getElementById('kpiContainer');
  if (kpi) kpi.innerHTML = '<div style="padding:16px;color:var(--text-secondary)">Yuklanmoqda...</div>';
  api('apiGetDashboard', State.token, {}).then(function (data) {
    Dash._data = data;
    App.progress(70);
    App._setText('dashScope', Dash._scopeText(data.scope));
    if (!data.widgets || data.widgets.total === 0) {
      if (kpi) kpi.innerHTML = '<div class="card" style="grid-column:1/-1">' +
        '<div class="empty-state"><span class="material-icons">inbox</span>' +
        '<div style="margin-top:8px"><strong>Ma\'lumot topilmadi</strong></div>' +
        '<div style="margin-top:4px">Avval <b>Import</b> bo\'limidan hisobot faylini yuklang.</div>' +
        '</div></div>';
    } else {
      Dash._renderKpis(data.widgets);
    }
    Dash._renderTopEngineers(data.charts.topEngineers);
    ChartsReady.then(function () { try { Dash._renderCharts(data.charts); } catch (ce) {} });
    App.progress(100);
  }).catch(function (e) {
    App.progress(0);
    App.toast(e.message, 'error');
    if (kpi) kpi.innerHTML = '<div class="card" style="grid-column:1/-1; border-left:4px solid var(--md-danger)">' +
      '<strong style="color:var(--md-danger)">Dashboard yuklanmadi</strong>' +
      '<div style="margin-top:8px; font-family:monospace; font-size:12px; white-space:pre-wrap">' +
      esc(e.message) + '</div></div>';
  });
};

Dash._scopeText = function (s) {
  if (!s) return '';
  var period = s.period ? (' — ' + s.period) : '';
  if (s.role === 'ADMIN') return 'Butun tizim bo\'yicha' + period;
  if (s.district) return s.district + ' tumani bo\'yicha' + period;
  return 'Umumiy holat' + period;
};


/* --------------------------- KPI KARTALAR ---------------------------- */
Dash._renderKpis = function (w) {
  var cards = [
    { label: 'Jami arizalar', value: w.total, icon: 'description', color: 'var(--md-primary)' },
    { label: 'Bajarilgan', value: w.completed, icon: 'check_circle', color: 'var(--md-success)' },
    { label: 'Jarayonda', value: w.inProgress, icon: 'pending', color: 'var(--md-warning)' },
    { label: 'Muddati o\'tgan', value: w.expired, icon: 'error', color: 'var(--md-danger)' },
    { label: 'Bugun tugaydi', value: w.dueToday, icon: 'today', color: 'var(--md-orange)' },
    { label: 'To\'lov kutilmoqda', value: w.waiting, icon: 'schedule', color: 'var(--md-orange)' },
    { label: 'Turar joy', value: w.residential, icon: 'home', color: 'var(--md-primary)' },
    { label: 'Noturar joy', value: w.nonResidential, icon: 'business', color: 'var(--md-secondary)' },
    { label: 'Bajarilish', value: w.completionRate + '%', icon: 'task_alt', color: 'var(--md-success)' },
    { label: 'Joriy oy daromadi', value: w.monthlyIncomeFmt, icon: 'payments', color: 'var(--md-success)' },
    { label: 'Yig\'ilgan to\'lov', value: w.totalPaidFmt, icon: 'account_balance_wallet', color: 'var(--md-primary)' }
  ];
  document.getElementById('kpiContainer').innerHTML = cards.map(function (c) {
    return '<div class="kpi"><div class="icon" style="background:' + c.color + '">' +
      '<span class="material-icons">' + c.icon + '</span></div>' +
      '<div><div class="value">' + esc(c.value) + '</div>' +
      '<div class="label">' + esc(c.label) + '</div></div></div>';
  }).join('');
};

/* ------------------------ TOP MUHANDISLAR ---------------------------- */
Dash._renderTopEngineers = function (list) {
  var t = document.getElementById('topEngineersTable');
  if (!list || !list.length) { t.innerHTML = '<tbody><tr><td>Ma\'lumot yo\'q</td></tr></tbody>'; return; }
  var rows = list.map(function (e) {
    return '<tr><td>' + e.rank + '</td><td>' + esc(e.name) + '</td><td>' + e.total +
      '</td><td>' + e.completionRate + '%</td><td><span class="badge" style="background:' +
      (e.expired === 0 ? 'var(--md-success)' : e.expired <= 5 ? 'var(--md-warning)' : 'var(--md-danger)') +
      '">' + e.expired + '</span></td></tr>';
  }).join('');
  t.innerHTML = '<thead><tr><th>#</th><th>Muhandis</th><th>Jami</th><th>Bajarilish</th><th>Muddati o\'tgan</th></tr></thead><tbody>' + rows + '</tbody>';
};

/* -------------------------- SO'NGGI FAOLLIK -------------------------- */
Dash._renderRecent = function (list) {
  var box = document.getElementById('recentActivities');
  if (!list || !list.length) { box.innerHTML = '<div class="empty-state">Faollik yo\'q</div>'; return; }
  box.innerHTML = list.map(function (r) {
    return '<div class="flex gap-12" style="padding:10px 0; border-bottom:1px solid var(--divider);">' +
      '<span class="dot" style="background:' + r.colorHex + '"></span>' +
      '<div style="flex:1"><strong>' + esc(r.applicationNo) + '</strong> · ' + esc(r.customer) +
      '<br><small style="color:var(--text-secondary)">' + esc(r.engineer) + ' · ' + esc(r.district) +
      ' · ' + esc(r.registerDate) + '</small></div>' +
      '<span class="badge" style="background:' + r.colorHex + '">' + esc(r.deadlineStatusLabel) + '</span></div>';
  }).join('');
};


/* ----------------------------- GRAFIKLAR ----------------------------- */
Dash._renderCharts = function (charts) {
  Dash._charts = charts;
  var th = chartTheme();

  // Holat taqsimoti (pie)
  var s = new google.visualization.DataTable();
  s.addColumn('string', 'Holat'); s.addColumn('number', 'Soni');
  charts.statusDistribution.forEach(function (x) { s.addRow([x.label, x.value]); });
  new google.visualization.PieChart(document.getElementById('chartStatus')).draw(s,
    Object.assign({}, th, { colors: charts.statusDistribution.map(function (x) { return x.color; }), pieHole: 0.4 }));

  // Turar/Noturar (pie)
  var r = new google.visualization.DataTable();
  r.addColumn('string', 'Tur'); r.addColumn('number', 'Soni');
  charts.residency.forEach(function (x) { r.addRow([x.label, x.value]); });
  new google.visualization.PieChart(document.getElementById('chartResidency')).draw(r,
    Object.assign({}, th, { colors: ['#1a73e8', '#5f6368'], pieHole: 0.4 }));

  // Oylik tendensiya grafigi olib tashlandi (talab bo'yicha).

  // To'lov holati (pie)
  var p = new google.visualization.DataTable();
  p.addColumn('string', 'Holat'); p.addColumn('number', 'Soni');
  charts.payment.forEach(function (x) { p.addRow([x.label, x.value]); });
  new google.visualization.PieChart(document.getElementById('chartPayment')).draw(p,
    Object.assign({}, th, { colors: ['#2e7d32', '#f9a825', '#ef6c00', '#c62828'] }));
};

Dash.redraw = function () {
  if (Dash._charts) ChartsReady.then(function () { Dash._renderCharts(Dash._charts); });
};


/* ============================ ARIZALAR =============================== */
var Apps = {};
Apps._filters = {};
Apps._page = 1;
Apps._initialized = false;

Apps.init = function () {
  if (Apps._initialized) { Apps.query(); return; }
  Apps._initialized = true;
  api('apiFilterOptions', State.token).then(function (opts) {
    State.filterOptions = opts;
    Apps._renderFilters(opts);
    Apps.query();
  }).catch(function (e) { App.toast(e.message, 'error'); });
};

Apps._renderFilters = function (o) {
  Apps._opts = o;
  function opt(v, l, sel) { return '<option value="' + esc(v) + '"' + (sel ? ' selected' : '') + '>' + esc(l) + '</option>'; }
  function selBox(id, label, items, valKey, labKey, onchange) {
    var opts = '<option value="">' + label + ' (barchasi)</option>';
    items.forEach(function (it) {
      var v = valKey ? it[valKey] : it;
      var l = labKey ? it[labKey] : it;
      opts += opt(v, l);
    });
    return '<div class="field" style="margin:0;"><label>' + label +
      '</label><select class="select" id="' + id + '"' +
      (onchange ? ' onchange="' + onchange + '"' : '') + '>' + opts + '</select></div>';
  }
  var html = '';
  html += selBox('fDistrict', 'Tuman', o.districts, 'name', 'name', 'Apps.onDistrictChange()');
  html += selBox('fEngineer', 'Muhandis', o.engineers, 'name', 'name');
  html += selBox('fType', 'Ariza turi', o.applicationTypes);
  html += selBox('fResidency', 'Turar/Noturar', o.residencies, 'value', 'label');
  html += selBox('fDeadline', 'Muddat holati', o.deadlineStatuses, 'value', 'label');
  html += selBox('fPayment', 'To\'lov holati', o.paymentStatuses, 'value', 'label');
  html += selBox('fYear', 'Yil', o.years);
  html += '<div class="field" style="margin:0;"><label>Sana (dan)</label><input type="date" class="input" id="fDateFrom"></div>';
  html += '<div class="field" style="margin:0;"><label>Sana (gacha)</label><input type="date" class="input" id="fDateTo"></div>';
  html += '<div class="field" style="margin:0;"><label>Kadastr / Mijoz</label><input type="text" class="input" id="fSearch" placeholder="Qidirish..."></div>';
  document.getElementById('filtersContainer').innerHTML = html;
};

/** Tuman o'zgarsa — muhandislar ro'yxatini shu tumanga moslaydi. */
Apps.onDistrictChange = function () {
  var district = document.getElementById('fDistrict').value;
  var o = Apps._opts;
  var eSel = document.getElementById('fEngineer');
  var engs = o.engineers.filter(function (e) {
    return !district || e.district === district;
  });
  eSel.innerHTML = '<option value="">Muhandis (barchasi)</option>' +
    engs.map(function (e) { return '<option value="' + esc(e.name) + '">' + esc(e.name) + '</option>'; }).join('');
};

Apps._collectFilters = function () {
  function v(id) { var el = document.getElementById(id); return el ? el.value : ''; }
  return {
    district: v('fDistrict'), engineer: v('fEngineer'),
    applicationType: v('fType'), residency: v('fResidency'), deadlineStatus: v('fDeadline'),
    paymentStatus: v('fPayment'), year: v('fYear'), dateFrom: v('fDateFrom'),
    dateTo: v('fDateTo'), search: v('fSearch')
  };
};

Apps.applyFilters = function () { Apps._page = 1; Apps.query(); };
Apps.resetFilters = function () {
  Apps._renderFilters(State.filterOptions); Apps._page = 1; Apps.query();
};


Apps.query = function () {
  var filters = Apps._collectFilters();
  filters.page = Apps._page;
  filters.pageSize = 25;
  Apps._filters = filters;
  App.progress(30);
  api('apiQueryTable', State.token, filters).then(function (res) {
    App.progress(100);
    Apps._render(res);
  }).catch(function (e) { App.toast(e.message, 'error'); App.progress(0); });
};

Apps._render = function (res) {
  App._setText('appsCount', 'Jami: ' + res.total + ' ta ariza (sahifa ' + res.page + '/' + res.pages + ')');
  var t = document.getElementById('appsTable');
  if (!res.rows.length) {
    t.querySelector('thead').innerHTML = '';
    t.querySelector('tbody').innerHTML = '<tr><td><div class="empty-state"><span class="material-icons">inbox</span><div>Ma\'lumot topilmadi</div></div></td></tr>';
    document.getElementById('appsPagination').innerHTML = '';
    return;
  }
  t.querySelector('thead').innerHTML = '<tr><th>Tranzaksiya</th><th>Mijoz</th><th>Muhandis</th>' +
    '<th>Tuman</th><th>Tur</th><th>Muddat</th><th>Holat</th><th>Summa</th><th>To\'lov</th><th></th></tr>';
  t.querySelector('tbody').innerHTML = res.rows.map(function (r) {
    return '<tr><td><strong>' + esc(r.transactionNo || r.applicationNo || r.cadastreNo) + '</strong></td>' +
      '<td>' + esc(r.customer) + '</td><td>' + esc(r.engineer) + '</td><td>' + esc(r.district) + '</td>' +
      '<td>' + esc(r.residencyLabel) + '</td><td>' + esc(r.deadlineDate) + '</td>' +
      '<td><span class="badge" style="background:' + r.colorHex + '">' + esc(r.deadlineStatusLabel) + '</span></td>' +
      '<td>' + esc(r.amountFmt) + '</td>' +
      '<td><span class="badge" style="background:' + Apps._payColor(r.paymentStatus) + '">' + esc(r.paymentStatusLabel) + '</span></td>' +
      '<td><button class="btn-icon" onclick="Apps.showDetail(\'' + esc(r.rowId) + '\')"><span class="material-icons">visibility</span></button></td></tr>';
  }).join('');
  Apps._lastRows = res.rows;
  Apps._renderPagination(res);
};

Apps._payColor = function (s) {
  return { PAID: 'var(--md-success)', PARTIAL: 'var(--md-warning)',
    WAITING: 'var(--md-orange)', UNPAID: 'var(--md-danger)' }[s] || 'var(--md-secondary)';
};

Apps._renderPagination = function (res) {
  var html = '<button class="btn" ' + (res.page <= 1 ? 'disabled' : '') +
    ' onclick="Apps.goPage(' + (res.page - 1) + ')"><span class="material-icons">chevron_left</span></button>' +
    '<span>Sahifa ' + res.page + ' / ' + res.pages + '</span>' +
    '<button class="btn" ' + (res.page >= res.pages ? 'disabled' : '') +
    ' onclick="Apps.goPage(' + (res.page + 1) + ')"><span class="material-icons">chevron_right</span></button>';
  document.getElementById('appsPagination').innerHTML = html;
};

Apps.goPage = function (p) { Apps._page = p; Apps.query(); };


Apps.showDetail = function (rowId) {
  var rows = (Apps._lastRows || []).concat(window._searchCache || []);
  var r = null;
  for (var i = 0; i < rows.length; i++) { if (rows[i].rowId === rowId) { r = rows[i]; break; } }
  if (!r) { App.toast('Yozuv topilmadi', 'warning'); return; }
  function row(l, v) { return '<tr><th style="width:40%">' + esc(l) + '</th><td>' + esc(v) + '</td></tr>'; }
  var body = '<table class="data-table"><tbody>' +
    row('Ariza raqami', r.applicationNo) + row('Tranzaksiya', r.transactionNo) +
    row('Kadastr raqami', r.cadastreNo) + row('Mijoz', r.customer) +
    row('STIR', r.tin) +
    row('Tuman', r.district) + row('Muhandis', r.engineer) +
    row('Ariza turi', r.applicationType) + row('Obyekt turi', r.objectType) +
    row('Turar/Noturar', r.residencyLabel) + row('Qabul sanasi', r.registerDate) +
    row('Muddat', r.deadlineDate) + row('Bajarilgan', r.completeDate) +
    row('Muddat holati', r.deadlineStatusLabel) + row('Qolgan kun', r.remainingDays) +
    row('To\'lovga chiqarilgan', r.issuedDate) + row('Registrator', r.registrator) +
    row('Summa', r.amountFmt) +
    row('To\'langan', r.paidFmt) + row('Qarz', r.debtFmt) +
    row('To\'lov holati', r.paymentStatusLabel) + row('Izoh', r.note) +
    '</tbody></table>';
  App.showModal('Ariza tafsilotlari', body,
    '<button class="btn" onclick="App.closeModal(\'genericModal\')">Yopish</button>');
};

Apps.export = function (format) {
  App.toast(format.toUpperCase() + ' tayyorlanmoqda...', 'info');
  App.progress(40);
  var filters = Apps._collectFilters();
  api('apiExport', State.token, State.csrf, filters, format).then(function (res) {
    App.progress(100);
    Apps._download(res.base64, res.fileName, res.mimeType);
    App.toast(res.rows + ' qator eksport qilindi', 'success');
  }).catch(function (e) { App.toast(e.message, 'error'); App.progress(0); });
};

Apps._download = function (base64, fileName, mimeType) {
  var bin = atob(base64);
  var bytes = new Uint8Array(bin.length);
  for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  var blob = new Blob([bytes], { type: mimeType });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = fileName; document.body.appendChild(a); a.click();
  document.body.removeChild(a); setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
};

Apps.print = function () {
  App.progress(40);
  var filters = Apps._collectFilters();
  api('apiPrint', State.token, filters).then(function (res) {
    App.progress(100);
    var w = window.open('', '_blank');
    w.document.write('<html><head><title>DKP Arizalar</title><style>' +
      'table{width:100%;border-collapse:collapse;font-family:sans-serif;font-size:11px}' +
      'th,td{border:1px solid #999;padding:4px 6px;text-align:left}th{background:#eee}</style></head><body>' +
      '<h3>DKP Arizalar Nazorati — ' + res.rows + ' ta yozuv</h3>' + res.html + '</body></html>');
    w.document.close(); w.focus(); setTimeout(function () { w.print(); }, 500);
  }).catch(function (e) { App.toast(e.message, 'error'); App.progress(0); });
};


/* ============================== MOLIYA =============================== */
var FinanceUI = {};
FinanceUI._data = null;
FinanceUI._inited = false;

FinanceUI.init = function () {
  if (FinanceUI._inited) { FinanceUI.load(); return; }
  function fill(o) {
    function opts(items) {
      return '<option value="">Barchasi</option>' + (items || []).map(function (it) {
        var n = it.name || it; return '<option value="' + esc(n) + '">' + esc(n) + '</option>';
      }).join('');
    }
    var dd = document.getElementById('finDistrict'); if (dd) dd.innerHTML = opts(o.districts);
    var ee = document.getElementById('finEngineer'); if (ee) ee.innerHTML = opts(o.engineers);
    var rr = document.getElementById('finRegistrator'); if (rr) rr.innerHTML = opts(o.registrators);
    FinanceUI._inited = true;
    FinanceUI.load();
  }
  if (State.filterOptions) fill(State.filterOptions);
  else api('apiFilterOptions', State.token).then(function (o) { State.filterOptions = o; fill(o); })
    .catch(function (e) { App.toast(e.message, 'error'); });
};

FinanceUI._filters = function () {
  function v(id) { var el = document.getElementById(id); return el ? el.value : ''; }
  return { district: v('finDistrict'), engineer: v('finEngineer'), registrator: v('finRegistrator') };
};

FinanceUI.load = function () {
  App.progress(30);
  api('apiGetDashboard', State.token, FinanceUI._filters()).then(function (d) {
    App.progress(100);
    FinanceUI._data = d;
    var w = d.widgets;
    var kpi = [
      { label: 'Jami summa', value: w.totalAmountFmt || w.totalPaidFmt, icon: 'account_balance', color: 'var(--md-primary)' },
      { label: 'Yig\'ilgan to\'lov', value: w.totalPaidFmt, icon: 'payments', color: 'var(--md-success)' },
      { label: 'To\'lov kutilmoqda', value: w.totalDebtFmt, icon: 'schedule', color: 'var(--md-orange)' },
      { label: 'Yig\'ilish darajasi', value: w.collectionRate + '%', icon: 'percent', color: 'var(--md-primary)' }
    ];
    document.getElementById('financeKpi').innerHTML = kpi.map(function (c) {
      return '<div class="kpi"><div class="icon" style="background:' + c.color + '">' +
        '<span class="material-icons">' + c.icon + '</span></div><div><div class="value" style="font-size:18px">' +
        esc(c.value) + '</div><div class="label">' + esc(c.label) + '</div></div></div>';
    }).join('');
    FinanceUI.render();
  }).catch(function (e) { App.toast(e.message, 'error'); App.progress(0); });
};

FinanceUI.render = function () {
  if (!FinanceUI._data) return;
  var by = (document.getElementById('finGroupBy') || {}).value || 'district';
  var fin = FinanceUI._data.finance;
  var list = by === 'engineer' ? fin.byEngineer : by === 'registrator' ? fin.byRegistrator : fin.byDistrict;
  var label = by === 'engineer' ? 'Muhandis' : by === 'registrator' ? 'Registrator' : 'Tuman';
  document.getElementById('finCount').textContent =
    'Jami: ' + (list ? list.length : 0) + ' ta ' + label.toLowerCase();
  FinanceUI._renderTable(list, label);
};

FinanceUI._renderTable = function (list, label) {
  var t = document.getElementById('financeRegionTable');
  if (!list || !list.length) { t.innerHTML = '<tbody><tr><td>Ma\'lumot yo\'q</td></tr></tbody>'; return; }
  t.innerHTML = '<thead><tr><th>' + esc(label) + '</th><th>Arizalar</th><th>To\'langan summa</th>' +
    '<th>To\'lov kutilmoqda</th></tr></thead><tbody>' +
    list.map(function (g) {
      return '<tr><td>' + esc(g.name) + '</td><td>' + g.count + '</td><td>' +
        Number(g.paid).toLocaleString('ru-RU') + '</td><td>' +
        Number(g.debt).toLocaleString('ru-RU') + '</td></tr>';
    }).join('') + '</tbody>';
};

FinanceUI.exportExcel = function () {
  App.toast('Excel tayyorlanmoqda...', 'info');
  App.progress(40);
  api('apiExport', State.token, State.csrf, FinanceUI._filters(), 'xlsx').then(function (res) {
    App.progress(100);
    Apps._download(res.base64, res.fileName, res.mimeType);
    App.toast(res.rows + ' qator Excelga eksport qilindi', 'success');
  }).catch(function (e) { App.toast(e.message, 'error'); App.progress(0); });
};

/* ============================ REYTINGLAR ============================= */
var RankingsUI = {};
RankingsUI.load = function () {
  api('apiGetDashboard', State.token, {}).then(function (d) {
    RankingsUI._table('rankEngineers', d.rankings.engineers, 'Muhandis');
    RankingsUI._table('rankDistricts', d.rankings.districts, 'Tuman');
  }).catch(function (e) { App.toast(e.message, 'error'); });
};
RankingsUI._table = function (id, list, label) {
  var t = document.getElementById(id);
  if (!list || !list.length) { t.innerHTML = '<tbody><tr><td>Ma\'lumot yo\'q</td></tr></tbody>'; return; }
  t.innerHTML = '<thead><tr><th>#</th><th>' + label + '</th><th>Yakunlangan</th>' +
    '<th>To\'lovga chiqarilgan</th><th>To\'langan summa</th></tr></thead><tbody>' +
    list.map(function (e) {
      return '<tr><td>' + e.rank + '</td><td>' + esc(e.name) + '</td><td><strong>' + e.completed +
        '</strong></td><td>' + (e.issued || 0) + '</td><td>' +
        Number(e.paid || 0).toLocaleString('ru-RU') + '</td></tr>';
    }).join('') + '</tbody>';
};


/* ============================ HISOBOTLAR ============================= */
var ReportsUI = {};
ReportsUI._inited = false;

ReportsUI.init = function () {
  if (ReportsUI._inited) return;
  function fill(opts) {
    var dSel = document.getElementById('reportDistrict');
    var eSel = document.getElementById('reportEngineer');
    if (dSel) dSel.innerHTML = '<option value="">Tuman (barchasi)</option>' +
      opts.districts.map(function (d) { return '<option value="' + esc(d.name) + '">' + esc(d.name) + '</option>'; }).join('');
    if (eSel) eSel.innerHTML = '<option value="">Muhandis (barchasi)</option>' +
      opts.engineers.map(function (e) { return '<option value="' + esc(e.name) + '">' + esc(e.name) + '</option>'; }).join('');
    ReportsUI._opts = opts;
    if (dSel) dSel.onchange = ReportsUI._onDistrict;
  }
  if (State.filterOptions) { fill(State.filterOptions); ReportsUI._inited = true; }
  else {
    api('apiFilterOptions', State.token).then(function (opts) {
      State.filterOptions = opts; fill(opts); ReportsUI._inited = true;
    }).catch(function (e) { App.toast(e.message, 'error'); });
  }
};

ReportsUI._onDistrict = function () {
  var d = document.getElementById('reportDistrict').value;
  var eSel = document.getElementById('reportEngineer');
  var engs = ReportsUI._opts.engineers.filter(function (e) { return !d || e.district === d; });
  eSel.innerHTML = '<option value="">Muhandis (barchasi)</option>' +
    engs.map(function (e) { return '<option value="' + esc(e.name) + '">' + esc(e.name) + '</option>'; }).join('');
};

ReportsUI.load = function () {
  var type = document.getElementById('reportType').value;
  var filters = {
    district: (document.getElementById('reportDistrict') || {}).value || '',
    engineer: (document.getElementById('reportEngineer') || {}).value || ''
  };
  App.progress(30);
  api('apiGetReport', State.token, type, filters).then(function (rep) {
    App.progress(100);
    App._setText('reportTitle', rep.title + ' (' + rep.total + ')');
    var t = document.getElementById('reportTable');
    var head = '<thead><tr>' + rep.columns.map(function (c) { return '<th>' + esc(c) + '</th>'; }).join('') + '</tr></thead>';
    var body = '<tbody>' + (rep.rows.length ? rep.rows.map(function (row) {
      return '<tr>' + row.map(function (c) { return '<td>' + esc(c) + '</td>'; }).join('') + '</tr>';
    }).join('') : '<tr><td colspan="' + rep.columns.length + '"><div class="empty-state">Ma\'lumot yo\'q</div></td></tr>') + '</tbody>';
    t.innerHTML = head + body;
  }).catch(function (e) { App.toast(e.message, 'error'); App.progress(0); });
};

/* ============================== IMPORT =============================== */
var ImportUI = {};
ImportUI.init = function () {
  api('apiLastImport', State.token).then(function (info) {
    var box = document.getElementById('lastImportInfo');
    if (!box) return;
    if (!info) { box.textContent = 'Hali import qilinmagan.'; return; }
    box.innerHTML = '<strong>So\'nggi import:</strong> ' + esc(info.startedAt) +
      '<br>Holat: <strong>' + esc(info.status) + '</strong> · Qatorlar: ' + esc(info.validRows) +
      '/' + esc(info.totalRows) + ' · Davomiyligi: ' + Math.round((info.durationMs || 0) / 1000) + ' s';
  }).catch(function (e) {
    var box = document.getElementById('lastImportInfo');
    if (box) box.textContent = 'Ma\'lumotni olishda xato: ' + e.message;
  });
};

ImportUI._selectedFile = null;

/** Fayl tanlanganda — SheetJS bilan brauzerda 2D jadvalga o'qiydi. */
ImportUI.onFileSelected = function (input) {
  var btn = document.getElementById('importFileBtn');
  var nameEl = document.getElementById('importFileName');
  ImportUI._selectedFile = null;
  btn.disabled = true;
  if (!input.files || !input.files.length) { nameEl.textContent = ''; return; }

  var file = input.files[0];
  var maxMb = 25;
  if (file.size > maxMb * 1024 * 1024) {
    App.toast('Fayl hajmi ' + maxMb + ' MB dan oshmasligi kerak', 'error');
    input.value = ''; return;
  }
  if (typeof XLSX === 'undefined') {
    App.toast('Excel kutubxonasi yuklanmadi. Internetni tekshiring va sahifani yangilang.', 'error');
    return;
  }
  nameEl.textContent = file.name + ' — o\'qilmoqda...';
  var reader = new FileReader();
  reader.onload = function (e) {
    try {
      var wb = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
      var firstSheet = wb.Sheets[wb.SheetNames[0]];
      var matrix = XLSX.utils.sheet_to_json(firstSheet, { header: 1, raw: false, defval: '' });
      // Oxiridagi to'liq bo'sh qatorlarni olib tashlash.
      while (matrix.length && matrix[matrix.length - 1].every(function (c) { return c === '' || c == null; })) {
        matrix.pop();
      }
      if (matrix.length < 2) { throw new Error('Faylda yetarli ma\'lumot yo\'q (sarlavha + qatorlar).'); }
      ImportUI._selectedFile = { rows: matrix, fileName: file.name };
      nameEl.textContent = file.name + ' — ' + (matrix.length - 1) + ' qator tayyor';
      btn.disabled = false;
    } catch (err) {
      App.toast('Faylni o\'qishda xato: ' + err.message, 'error');
      nameEl.textContent = file.name + ' — xato';
    }
  };
  reader.onerror = function () { App.toast('Faylni o\'qishda xato', 'error'); };
  reader.readAsArrayBuffer(file);
};

/** Tanlangan jadvalni serverga yuborib, import qiladi. */
ImportUI.uploadAndImport = function () {
  if (!ImportUI._selectedFile) { App.toast('Avval fayl tanlang', 'warning'); return; }
  var btn = document.getElementById('importFileBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="material-icons" style="animation:spin 0.8s linear infinite">autorenew</span> Import qilinmoqda...';
  ImportUI._showProgress(10);
  api('apiImportData', State.token, State.csrf, ImportUI._selectedFile).then(function (rep) {
    ImportUI._renderReport(rep);
    if (rep.success) {
      App.toast('Fayldan import: ' + rep.validRows + '/' + rep.totalRows + ' qator', 'success');
      Dash.load(true); ImportUI.init(); App.loadNotifications();
      document.getElementById('importFileInput').value = '';
      ImportUI._selectedFile = null;
    } else {
      App.toast('Import xatosi: ' + rep.error, 'error');
    }
  }).catch(function (e) { App.toast(e.message, 'error'); App.progress(0); })
    .then(function () {
      btn.disabled = false;
      btn.innerHTML = '<span class="material-icons">upload_file</span> Faylni yuklab import qilish';
    });
};

ImportUI.run = function () {
  var btn = document.getElementById('importBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="material-icons" style="animation:spin 0.8s linear infinite">autorenew</span> Import qilinmoqda...';
  ImportUI._showProgress(15);
  api('apiRunImport', State.token, State.csrf).then(function (rep) {
    ImportUI._renderReport(rep);
    if (rep.success) {
      App.toast('Import muvaffaqiyatli: ' + rep.validRows + '/' + rep.totalRows, 'success');
      Dash.load(true); ImportUI.init(); App.loadNotifications();
    } else {
      App.toast('Import xatosi: ' + rep.error, 'error');
    }
  }).catch(function (e) { App.toast(e.message, 'error'); App.progress(0); })
    .then(function () {
      btn.disabled = false;
      btn.innerHTML = '<span class="material-icons">play_arrow</span> HISOBOT\'dan import';
    });
};

ImportUI._showProgress = function (startPct) {
  document.getElementById('importProgress').classList.remove('hidden');
  document.getElementById('importBar').style.width = startPct + '%';
  App.progress(startPct + 10);
};

ImportUI._renderReport = function (rep) {
  document.getElementById('importBar').style.width = '100%';
  App.progress(100);
  var html = '';
  var steps = (rep.steps || []).map(function (s) {
    var color = s.status === 'OK' ? 'var(--md-success)' : s.status === 'ERROR' ? 'var(--md-danger)' : 'var(--text-secondary)';
    return '<div style="color:' + color + '">• ' + esc(s.name) + ': ' + esc(s.status) +
      (s.detail ? ' — ' + esc(s.detail) : '') + '</div>';
  }).join('');
  html += steps;

  if (rep.detectedColumns && rep.detectedColumns.length) {
    html += '<div style="margin-top:10px"><strong>Tanilgan ustunlar (' +
      rep.detectedColumns.length + '):</strong><br><small style="color:var(--text-secondary)">' +
      rep.detectedColumns.map(esc).join(' · ') + '</small></div>';
  }
  if (rep.unmappedHeaders && rep.unmappedHeaders.length) {
    html += '<div style="margin-top:8px"><small style="color:var(--text-disabled)">Ishlatilmagan ustunlar: ' +
      rep.unmappedHeaders.length + ' ta</small></div>';
  }
  if (rep.warnings && rep.warnings.length) {
    html += '<div style="margin-top:8px; color:var(--md-warning)"><strong>Ogohlantirishlar:</strong><br><small>' +
      rep.warnings.slice(0, 10).map(esc).join('<br>') + '</small></div>';
  }
  document.getElementById('importSteps').innerHTML = html;
};

var DeadlineUI = {};
DeadlineUI._data = null;

DeadlineUI.load = function () {
  App.progress(30);
  api('apiGetDeadlineSettings', State.token).then(function (d) {
    App.progress(100);
    DeadlineUI._data = d;
    App._setText('dlDefaultDays', d.defaultDays);
    DeadlineUI._renderConfig(d.deadlineConfig);
    DeadlineUI._renderRules(d.rules);
    DeadlineUI._renderHolidays(d.holidays);
  }).catch(function (e) { App.toast(e.message, 'error'); App.progress(0); });
};

/* ---- Muddat hisoblash formulasi (sozlanadigan qiymatlar) ---- */
DeadlineUI._cfg = [];
DeadlineUI._groupLabel = {
  'manba': 'Ariza manbasi bo\'yicha',
  'flag': 'Kadastr passport olish turi (bayroq)',
  'ariza': 'Ariza turi bo\'yicha (aniq moslik)',
  'turar': 'Turar obyekt / kompozit',
  'noturar': 'Noturar obyekt / kompozit',
  'umumiy': 'Umumiy foydalanishdagi ko\'chmas mulk',
  'maydon': 'Maydon (m\u00b2) jadvali \u2014 noturar',
  'default': 'Standart (qolgan barcha hollar)'
};
DeadlineUI._groupOrder = ['manba', 'flag', 'ariza', 'turar', 'noturar', 'umumiy', 'maydon', 'default'];

DeadlineUI._groupOf = function (key) {
  var i = key.indexOf(':');
  return i === -1 ? key : key.substring(0, i);
};

DeadlineUI._renderConfig = function (list) {
  DeadlineUI._cfg = list || [];
  var wrap = document.getElementById('deadlineConfigWrap');
  if (!wrap) return;
  if (!DeadlineUI._cfg.length) {
    wrap.innerHTML = '<div class="empty-state" style="padding:24px">Qoidalar yo\'q</div>';
    return;
  }
  var groups = {};
  DeadlineUI._cfg.forEach(function (it, idx) {
    var g = DeadlineUI._groupOf(it.key);
    (groups[g] = groups[g] || []).push({ it: it, idx: idx });
  });
  var html = '';
  DeadlineUI._groupOrder.forEach(function (g) {
    if (!groups[g]) return;
    html += '<div style="margin-bottom:14px;">' +
      '<div style="font-weight:600; margin:8px 0; color:var(--text-primary);">' +
      esc(DeadlineUI._groupLabel[g] || g) + '</div>' +
      '<table class="data-table"><tbody>';
    groups[g].forEach(function (o) {
      var it = o.it, i = o.idx;
      var label = it.desc || it.key;
      html += '<tr>' +
        '<td style="width:58%">' + esc(label) +
        '<div style="color:var(--text-secondary);font-size:11px">' + esc(it.key) + '</div></td>' +
        '<td style="width:120px"><input type="number" class="input" id="dcVal_' + i +
        '" value="' + it.value + '" min="0" max="365" style="width:90px"></td>' +
        '<td><button class="btn-icon" title="Saqlash" onclick="DeadlineUI.saveParam(' + i +
        ')"><span class="material-icons">save</span></button>' +
        (it.fixed ? '' : '<button class="btn-icon" title="O\'chirish" onclick="DeadlineUI.deleteParam(' + i +
          ')"><span class="material-icons" style="color:var(--md-danger)">delete</span></button>') +
        '</td></tr>';
    });
    html += '</tbody></table></div>';
  });
  wrap.innerHTML = html;
};

DeadlineUI.saveParam = function (i) {
  var it = DeadlineUI._cfg[i]; if (!it) return;
  var v = document.getElementById('dcVal_' + i).value;
  if (v === '') { App.toast('Kun sonini kiriting', 'warning'); return; }
  api('apiSaveDeadlineParam', State.token, State.csrf, { key: it.key, value: v, desc: it.desc })
    .then(function () { App.toast('Saqlandi', 'success'); DeadlineUI.load(); })
    .catch(function (e) { App.toast(e.message, 'error'); });
};

DeadlineUI.deleteParam = function (i) {
  var it = DeadlineUI._cfg[i]; if (!it) return;
  if (!confirm('"' + it.key + '" qoidasini o\'chirasizmi?')) return;
  api('apiDeleteDeadlineParam', State.token, State.csrf, it.key)
    .then(function () { App.toast('O\'chirildi', 'success'); DeadlineUI.load(); })
    .catch(function (e) { App.toast(e.message, 'error'); });
};

DeadlineUI.addParam = function () {
  var g = document.getElementById('dcNewGroup').value;
  var val = document.getElementById('dcNewValue').value.trim();
  var days = document.getElementById('dcNewDays').value;
  if (!val || days === '') { App.toast('Qiymat va kunni kiriting', 'warning'); return; }
  var key = g + ':' + val;
  api('apiSaveDeadlineParam', State.token, State.csrf, { key: key, value: days, desc: '' })
    .then(function () {
      App.toast('Qoida qo\'shildi', 'success');
      document.getElementById('dcNewValue').value = '';
      document.getElementById('dcNewDays').value = '';
      DeadlineUI.load();
    }).catch(function (e) { App.toast(e.message, 'error'); });
};

DeadlineUI.resetConfig = function () {
  if (!confirm('Barcha muddat qoidalarini standart (Excel formulasi) holatiga qaytarasizmi?')) return;
  api('apiResetDeadlineConfig', State.token, State.csrf)
    .then(function () { App.toast('Standart holat tiklandi', 'success'); DeadlineUI.load(); })
    .catch(function (e) { App.toast(e.message, 'error'); });
};

DeadlineUI._resLabel = function (v) {
  return v === 'RESIDENTIAL' ? 'Turar joy' : v === 'NON_RESIDENTIAL' ? 'Noturar joy' : 'Barchasi';
};

DeadlineUI._renderRules = function (list) {
  var t = document.getElementById('rulesTable');
  if (!list || !list.length) {
    t.innerHTML = '<tbody><tr><td><div class="empty-state" style="padding:24px">Qoidalar yo\'q</div></td></tr></tbody>';
    return;
  }
  t.innerHTML = '<thead><tr><th>Ariza turi</th><th>Turi</th><th>Muddat (ish kuni)</th><th></th></tr></thead><tbody>' +
    list.map(function (r) {
      return '<tr><td>' + esc(r.name) + '</td><td>' + esc(DeadlineUI._resLabel(r.residency)) +
        '</td><td><strong>' + r.days + '</strong></td>' +
        '<td><button class="btn-icon" title="Tahrirlash" onclick="DeadlineUI.editRule(\'' +
        esc(r.name).replace(/'/g, "\\'") + '\')"><span class="material-icons">edit</span></button>' +
        '<button class="btn-icon" title="O\'chirish" onclick="DeadlineUI.deleteRule(\'' +
        esc(r.name).replace(/'/g, "\\'") + '\')"><span class="material-icons" style="color:var(--md-danger)">delete</span></button></td></tr>';
    }).join('') + '</tbody>';
};

DeadlineUI.editRule = function (name) {
  var r = (DeadlineUI._data.rules || []).filter(function (x) { return x.name === name; })[0];
  if (!r) return;
  document.getElementById('ruleName').value = r.name;
  document.getElementById('ruleResidency').value = r.residency || '';
  document.getElementById('ruleDays').value = r.days;
  window.scrollTo(0, 0);
};

DeadlineUI.saveRule = function () {
  var rule = {
    name: document.getElementById('ruleName').value.trim(),
    residency: document.getElementById('ruleResidency').value,
    days: document.getElementById('ruleDays').value
  };
  if (!rule.name || !rule.days) { App.toast('Ariza turi va muddatni kiriting', 'warning'); return; }
  api('apiSaveDeadlineRule', State.token, State.csrf, rule).then(function () {
    App.toast('Muddat qoidasi saqlandi', 'success');
    document.getElementById('ruleName').value = '';
    document.getElementById('ruleDays').value = '';
    DeadlineUI.load();
  }).catch(function (e) { App.toast(e.message, 'error'); });
};

DeadlineUI.deleteRule = function (name) {
  if (!confirm('"' + name + '" qoidasini o\'chirasizmi?')) return;
  api('apiDeleteDeadlineRule', State.token, State.csrf, name).then(function () {
    App.toast('Qoida o\'chirildi', 'success'); DeadlineUI.load();
  }).catch(function (e) { App.toast(e.message, 'error'); });
};

DeadlineUI._renderHolidays = function (list) {
  var t = document.getElementById('holidaysTable');
  if (!list || !list.length) {
    t.innerHTML = '<tbody><tr><td><div class="empty-state" style="padding:24px">Bayram kunlari yo\'q</div></td></tr></tbody>';
    return;
  }
  t.innerHTML = '<thead><tr><th>Sana</th><th>Nomi</th><th></th></tr></thead><tbody>' +
    list.map(function (h) {
      return '<tr><td>' + esc(h.dateFmt) + '</td><td>' + esc(h.name) + '</td>' +
        '<td><button class="btn-icon" title="O\'chirish" onclick="DeadlineUI.deleteHoliday(\'' +
        esc(h.date) + '\')"><span class="material-icons" style="color:var(--md-danger)">delete</span></button></td></tr>';
    }).join('') + '</tbody>';
};

DeadlineUI.addHoliday = function () {
  var holiday = {
    date: document.getElementById('holidayDate').value,
    name: document.getElementById('holidayName').value.trim()
  };
  if (!holiday.date) { App.toast('Sanani tanlang', 'warning'); return; }
  api('apiAddHoliday', State.token, State.csrf, holiday).then(function () {
    App.toast('Bayram kuni qo\'shildi', 'success');
    document.getElementById('holidayDate').value = '';
    document.getElementById('holidayName').value = '';
    DeadlineUI.load();
  }).catch(function (e) { App.toast(e.message, 'error'); });
};

DeadlineUI.deleteHoliday = function (date) {
  if (!confirm('Bu bayram kunini o\'chirasizmi?')) return;
  api('apiDeleteHoliday', State.token, State.csrf, date).then(function () {
    App.toast('Bayram kuni o\'chirildi', 'success'); DeadlineUI.load();
  }).catch(function (e) { App.toast(e.message, 'error'); });
};
