<!-- dashboard.js.html — Dashboard va boshqa view'lar logikasi -->
<script>
/* ===================== GRID (universal jadval) =====================
 * Har qanday jadval uchun: 50 qatorli sahifalash + ustun bo'yicha filtrlash
 * + Excelga eksport. Filtr qatori thead'da bo'lib, faqat tbody yangilanadi
 * (filtr inputlarining fokusi yo'qolmaydi).
 * columns: [{label, html?}]; rows: [[cell, ...], ...] (cell HTML bo'lishi mumkin)
 * opts: {pageSize, exportName, filterable=true}
 */
var Grid = { _state: {}, PAGE_SIZE: 50 };

Grid.render = function (tableId, columns, rows, opts) {
  opts = opts || {};
  rows = rows || [];
  var st = Grid._state[tableId] || {};
  Grid._state[tableId] = st;
  st.columns = columns;
  st.allRows = rows;
  st.filters = {};                 // yangi ma'lumot — filtrlar tozalanadi
  st.page = 1;
  st.pageSize = opts.pageSize || Grid.PAGE_SIZE;
  st.exportName = opts.exportName || tableId;
  st.filterable = opts.filterable !== false;

  var t = document.getElementById(tableId);
  if (!t) return;

  var headRow = '<tr>' + columns.map(function (c) {
    return '<th>' + esc(c.label != null ? c.label : c) + '</th>';
  }).join('') + '</tr>';
  var filterRow = st.filterable ? '<tr class="grid-filter">' + columns.map(function (c, ci) {
    return '<th><input type="text" class="grid-fi" placeholder="filtr…" ' +
      'oninput="Grid.filter(\'' + tableId + '\',' + ci + ',this.value)"></th>';
  }).join('') + '</tr>' : '';

  // thead bir marta yoziladi, keyin faqat tbody yangilanadi (fokus saqlanadi).
  t.innerHTML = '<thead>' + headRow + filterRow + '</thead><tbody></tbody>';
  Grid._renderBody(tableId);
};

/** Joriy filtrlarga mos qatorlar. */
Grid._view = function (st) {
  var keys = [];
  for (var k in st.filters) { if (st.filters.hasOwnProperty(k) && st.filters[k]) keys.push(k); }
  if (!keys.length) return st.allRows;
  return st.allRows.filter(function (r) {
    for (var i = 0; i < keys.length; i++) {
      var ci = keys[i];
      var col = st.columns[ci] || {};
      var cell = r[ci];
      var text = String(cell == null ? '' : cell);
      if (col.html) text = text.replace(/<[^>]*>/g, ' ');
      if (text.toLowerCase().indexOf(st.filters[ci].toLowerCase()) === -1) return false;
    }
    return true;
  });
};

Grid._renderBody = function (tableId) {
  var st = Grid._state[tableId]; if (!st) return;
  var t = document.getElementById(tableId); if (!t) return;
  var columns = st.columns;
  var view = Grid._view(st);
  var total = view.length;
  var pages = Math.max(1, Math.ceil(total / st.pageSize));
  if (st.page > pages) st.page = pages;
  if (st.page < 1) st.page = 1;
  var start = (st.page - 1) * st.pageSize;
  var pageRows = view.slice(start, start + st.pageSize);

  var bodyHtml = pageRows.length ? pageRows.map(function (r) {
    return '<tr>' + r.map(function (cell, ci) {
      var col = columns[ci] || {};
      return '<td>' + (col.html ? (cell == null ? '' : cell) : esc(cell)) + '</td>';
    }).join('') + '</tr>';
  }).join('') : '<tr><td colspan="' + columns.length +
    '"><div class="empty-state" style="padding:24px">Ma\'lumot yo\'q</div></td></tr>';
  var tb = t.querySelector('tbody');
  if (tb) tb.innerHTML = bodyHtml;

  var ctrl = document.getElementById(tableId + '_ctrl');
  if (ctrl) {
    ctrl.innerHTML = '<div class="grid-bar">' +
      '<span style="color:var(--text-secondary);font-size:13px">Jami: ' + total +
      ' · sahifa ' + st.page + '/' + pages + '</span>' +
      '<div class="flex gap-8">' +
      '<button class="btn" ' + (st.page <= 1 ? 'disabled' : '') +
      ' onclick="Grid.go(\'' + tableId + '\',' + (st.page - 1) + ')"><span class="material-icons">chevron_left</span></button>' +
      '<button class="btn" ' + (st.page >= pages ? 'disabled' : '') +
      ' onclick="Grid.go(\'' + tableId + '\',' + (st.page + 1) + ')"><span class="material-icons">chevron_right</span></button>' +
      '<button class="btn btn-primary" onclick="Grid.exportExcel(\'' + tableId + '\')">' +
      '<span class="material-icons">grid_on</span> Excel</button>' +
      '</div></div>';
  }
};

Grid.filter = function (tableId, colIndex, value) {
  var st = Grid._state[tableId]; if (!st) return;
  st.filters[colIndex] = value;
  st.page = 1;
  Grid._renderBody(tableId);   // faqat tbody — filtr inputi fokusi saqlanadi
};

Grid.go = function (tableId, page) {
  var st = Grid._state[tableId]; if (!st) return;
  st.page = page;
  Grid._renderBody(tableId);
};

Grid.exportExcel = function (tableId) {
  var st = Grid._state[tableId]; if (!st) return;
  function strip(s) { return String(s == null ? '' : s).replace(/<[^>]*>/g, '').replace(/&nbsp;/g, ' ').replace(/&amp;/g, '&').trim(); }
  var headers = st.columns.map(function (c) { return c.label != null ? c.label : c; });
  var view = Grid._view(st);    // eksport — filtrlangan ko'rinishni oladi
  var aoa = [headers].concat(view.map(function (r) { return r.map(strip); }));
  var name = (st.exportName || 'export') + '_' +
    (new Date()).toISOString().slice(0, 19).replace(/[:T]/g, '');
  if (typeof XLSX !== 'undefined') {
    var ws = XLSX.utils.aoa_to_sheet(aoa);
    var wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Hisobot');
    XLSX.writeFile(wb, name + '.xlsx');
  } else {
    var csv = aoa.map(function (row) {
      return row.map(function (c) {
        var s = String(c); return /[",\r\n;]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
      }).join(',');
    }).join('\r\n');
    var blob = new Blob(['\uFEFF' + csv], { type: 'text/csv' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a'); a.href = url; a.download = name + '.csv';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
  }
};


/* ============================== DASH ================================= */
var Dash = {};
Dash._data = null;

Dash.load = function (force) {
  App.progress(30);
  var kpi = document.getElementById('kpiContainer');
  if (kpi) kpi.innerHTML = '<div style="padding:16px;color:var(--text-secondary)">Yuklanmoqda...</div>';
  api('apiGetDashboard', State.token, {}).then(function (data) {
    Dash._data = data;
    App.progress(70);
    App._setText('dashScope', Dash._scopeText(data.scope));
    if (!data.widgets || data.widgets.total === 0) {
      if (kpi) kpi.innerHTML = '<div class="card" style="grid-column:1/-1">' +
        '<div class="empty-state"><span class="material-icons">inbox</span>' +
        '<div style="margin-top:8px"><strong>Ma\'lumot topilmadi</strong></div>' +
        '<div style="margin-top:4px">Avval <b>Import</b> bo\'limidan hisobot faylini yuklang.</div>' +
        '</div></div>';
    } else {
      Dash._renderKpis(data.widgets);
    }
    Dash._renderSummary(data.summaryTable);
    App.progress(100);
  }).catch(function (e) {
    App.progress(0);
    App.toast(e.message, 'error');
    if (kpi) kpi.innerHTML = '<div class="card" style="grid-column:1/-1; border-left:4px solid var(--md-danger)">' +
      '<strong style="color:var(--md-danger)">Dashboard yuklanmadi</strong>' +
      '<div style="margin-top:8px; font-family:monospace; font-size:12px; white-space:pre-wrap">' +
      esc(e.message) + '</div></div>';
  });
};

Dash._scopeText = function (s) {
  if (!s) return '';
  var period = s.period ? (' — ' + s.period) : '';
  var base;
  if (s.role === 'ADMIN') base = 'Butun tizim bo\'yicha' + period;
  else if (s.district) base = s.district + ' tumani bo\'yicha' + period;
  else base = 'Umumiy holat' + period;
  if (s.sources && s.sources.length) {
    base += '  ⚠️ Manba filtri faol (faqat: ' + s.sources.join(', ') + ')';
  }
  return base;
};


/* --------------------------- KPI KARTALAR ---------------------------- */
Dash._renderKpis = function (w) {
  function card(c) {
    return '<div class="kpi"><div class="icon" style="background:' + c.color + '">' +
      '<span class="material-icons">' + c.icon + '</span></div>' +
      '<div><div class="value">' + esc(c.value) + '</div>' +
      '<div class="label">' + esc(c.label) + '</div></div></div>';
  }
  // 1-qator: Jarayondagi arizalar va undan kelib chiqadigan ko'rsatkichlar.
  var row1 = [
    { label: 'Jami jarayondagi arizalar', value: w.inProgress, icon: 'pending_actions', color: 'var(--md-warning)' },
    { label: 'Bugun tugaydi', value: w.dueToday, icon: 'today', color: 'var(--md-orange)' },
    { label: 'Muddati o\'tgan', value: w.expired, icon: 'error', color: 'var(--md-danger)' },
    { label: 'Turar joy (jarayonda)', value: w.inProgressResidential, icon: 'home', color: 'var(--md-primary)' },
    { label: 'Noturar joy (jarayonda)', value: w.inProgressNonResidential, icon: 'business', color: 'var(--md-secondary)' }
  ];
  // 2-qator: Shu oy uchun arizalar.
  var row2 = [
    { label: 'Shu oy jami arizalar', value: w.total, icon: 'description', color: 'var(--md-primary)' },
    { label: 'Yakunlangan', value: w.completed, icon: 'check_circle', color: 'var(--md-success)' },
    { label: 'Rad etilgan', value: w.rejected, icon: 'cancel', color: 'var(--md-danger)' },
    { label: 'To\'lov kutilmoqda', value: w.waiting, icon: 'schedule', color: 'var(--md-orange)' }
  ];
  // 3-qator: Moliyaviy ko'rsatkichlar.
  var row3 = [
    { label: 'Joriy oy daromadi', value: w.monthlyIncomeFmt, icon: 'payments', color: 'var(--md-success)' },
    { label: 'To\'lov kutilayotgan summa', value: w.totalDebtFmt, icon: 'account_balance_wallet', color: 'var(--md-orange)' }
  ];
  document.getElementById('kpiContainer').innerHTML =
    '<div class="kpi-row">' + row1.map(card).join('') + '</div>' +
    '<div class="kpi-row">' + row2.map(card).join('') + '</div>' +
    '<div class="kpi-row">' + row3.map(card).join('') + '</div>';
};

/* ------------------------ TOP MUHANDISLAR ---------------------------- */
/* (Boshqaruv panelidan olib tashlandi — talab bo'yicha) */

/* --------------- TUMANLAR KESIMIDA SVOD JADVALI --------------------- */
Dash._summary = null;
Dash._dayCols = [
  { key: 'd1', label: '1-kun' }, { key: 'd2', label: '2-kun' },
  { key: 'd3', label: '3-kun' }, { key: 'd4', label: '4-kun' },
  { key: 'd5', label: '5-kun' }, { key: 'd6_10', label: '6-10 kun' },
  { key: 'd10p', label: '>10 kun' }
];

Dash._renderSummary = function (st) {
  Dash._summary = st;
  var t = document.getElementById('summaryTable');
  if (!t) return;
  if (!st || !st.rows || !st.rows.length) {
    t.innerHTML = '<tbody><tr><td><div class="empty-state" style="padding:24px">' +
      'Jarayonda turgan ariza yo\'q</div></td></tr></tbody>';
    return;
  }
  var roles = st.roleColumns || [];
  function n(v) { return v ? v : ''; }   // 0 ni bo'sh ko'rsatamiz (Excel uslubi)

  // --- Guruhli sarlavha (2 qator, rowspan/colspan) ---
  var g1 = '<tr class="grp">' +
    '<th rowspan="2">№</th>' +
    '<th rowspan="2" class="ltxt">Hududlar</th>' +
    '<th rowspan="2">Jami yakunlash kerak</th>' +
    '<th colspan="2" class="grp-red">Shundan muddati o\'tgan arizalar</th>' +
    '<th rowspan="2" class="grp-yellow">Bugun muddati tugaydigan</th>' +
    '<th colspan="2">Obyekt turi</th>' +
    '<th colspan="' + roles.length + '">Shundan jarayonda turgan rollar kesmida</th>' +
    '<th colspan="' + Dash._dayCols.length + '" class="grp-red">Muddat buzilishini oldini olish tahlili (qolgan kun)</th>' +
    '</tr>';
  var g2 = '<tr>' +
    '<th class="cred">Filial tomonida o\'tgan</th>' +
    '<th class="cred">Registratsiya tomonidan o\'tgan</th>' +
    '<th>Turar</th><th>Noturar</th>' +
    roles.map(function (r) { return '<th class="rot"><span>' + esc(r) + '</span></th>'; }).join('') +
    Dash._dayCols.map(function (d) { return '<th>' + esc(d.label) + '</th>'; }).join('') +
    '</tr>';

  function rowHtml(g, idx, isTotal) {
    var tds = '';
    tds += '<td>' + (isTotal ? '' : idx) + '</td>';
    tds += '<td class="ltxt"><strong>' + esc(g.district) + '</strong></td>';
    tds += '<td><strong>' + n(g.total) + '</strong></td>';
    tds += '<td class="danger">' + n(g.expiredBranch) + '</td>';
    tds += '<td class="danger">' + n(g.expiredReg) + '</td>';
    tds += '<td class="hl">' + n(g.dueToday) + '</td>';
    tds += '<td>' + n(g.residential) + '</td>';
    tds += '<td>' + n(g.nonResidential) + '</td>';
    tds += roles.map(function (r) { return '<td>' + n((g.roles || {})[r] || 0) + '</td>'; }).join('');
    tds += Dash._dayCols.map(function (d) { return '<td>' + n(g[d.key]) + '</td>'; }).join('');
    return '<tr' + (isTotal ? ' class="totals"' : '') + '>' + tds + '</tr>';
  }

  var body = rowHtml(st.totals, 0, true) +
    st.rows.map(function (g, i) { return rowHtml(g, i + 1, false); }).join('');

  t.innerHTML = '<thead>' + g1 + g2 + '</thead><tbody>' + body + '</tbody>';
};

/** SVOD jadvalini Excelga eksport qiladi (yagona sarlavha qatori bilan). */
Dash.exportSummary = function () {
  var st = Dash._summary;
  if (!st || !st.rows || !st.rows.length) { App.toast('Eksport uchun ma\'lumot yo\'q', 'warning'); return; }
  var roles = st.roleColumns || [];
  var headers = ['№', 'Hududlar', 'Jami yakunlash kerak',
    'Filial tomonida o\'tgan', 'Registratsiya tomonidan o\'tgan', 'Bugun muddati tugaydigan',
    'Turar', 'Noturar']
    .concat(roles)
    .concat(Dash._dayCols.map(function (d) { return d.label + ' qolgan'; }));
  function rowArr(g, idx) {
    return [idx, g.district, g.total, g.expiredBranch, g.expiredReg, g.dueToday,
      g.residential, g.nonResidential]
      .concat(roles.map(function (r) { return (g.roles || {})[r] || 0; }))
      .concat(Dash._dayCols.map(function (d) { return g[d.key]; }));
  }
  var aoa = [headers];
  var totRow = rowArr(st.totals, 'JAMI'); totRow[1] = st.totals.district;
  aoa.push(totRow);
  st.rows.forEach(function (g, i) { aoa.push(rowArr(g, i + 1)); });

  var name = 'tumanlar_svod_' + (new Date()).toISOString().slice(0, 19).replace(/[:T]/g, '');
  if (typeof XLSX !== 'undefined') {
    var ws = XLSX.utils.aoa_to_sheet(aoa);
    var wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'SVOD');
    XLSX.writeFile(wb, name + '.xlsx');
  } else {
    var csv = aoa.map(function (row) {
      return row.map(function (c) {
        var s = String(c == null ? '' : c); return /[",\r\n;]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
      }).join(',');
    }).join('\r\n');
    var blob = new Blob(['\uFEFF' + csv], { type: 'text/csv' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a'); a.href = url; a.download = name + '.csv';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
  }
};

/* ============================ ARIZALAR =============================== */
var Apps = {};
Apps._filters = {};
Apps._page = 1;
Apps._initialized = false;

Apps.init = function () {
  if (Apps._initialized) { Apps.query(); return; }
  Apps._initialized = true;
  api('apiFilterOptions', State.token).then(function (opts) {
    State.filterOptions = opts;
    Apps._renderFilters(opts);
    Apps.query();
  }).catch(function (e) { App.toast(e.message, 'error'); });
};

Apps._renderFilters = function (o) {
  Apps._opts = o;
  function opt(v, l, sel) { return '<option value="' + esc(v) + '"' + (sel ? ' selected' : '') + '>' + esc(l) + '</option>'; }
  function selBox(id, label, items, valKey, labKey, onchange) {
    items = items || [];
    var opts = '<option value="">' + label + ' (barchasi)</option>';
    items.forEach(function (it) {
      var v = valKey ? it[valKey] : it;
      var l = labKey ? it[labKey] : it;
      opts += opt(v, l);
    });
    return '<div class="field" style="margin:0;"><label>' + label +
      '</label><select class="select" id="' + id + '"' +
      (onchange ? ' onchange="' + onchange + '"' : '') + '>' + opts + '</select></div>';
  }
  var html = '';
  if (!App.isEngineer()) {
    // Tuman/Muhandis filtrlari faqat admin va bosh muhandis uchun.
    html += selBox('fDistrict', 'Tuman', o.districts, 'name', 'name', 'Apps.onDistrictChange()');
    html += selBox('fEngineer', 'Muhandis', o.engineers, 'name', 'name');
  }
  html += selBox('fType', 'Ariza turi', o.applicationTypes);
  html += selBox('fPurpose', 'Ariza maqsadi', o.applicationPurposes || []);
  html += selBox('fProcRole', 'Oxirgi jarayon roli', o.lastProcessRoles || []);
  html += selBox('fProcName', 'Oxirgi jarayon nomi', o.lastProcessNames || []);
  html += selBox('fResidency', 'Turar/Noturar', o.residencies, 'value', 'label');
  html += selBox('fDeadline', 'Muddat holati', o.deadlineStatuses, 'value', 'label');
  html += selBox('fPayment', 'To\'lov holati', o.paymentStatuses, 'value', 'label');
  html += selBox('fYear', 'Yil', o.years);
  html += '<div class="field" style="margin:0;"><label>Sana (dan)</label><input type="date" class="input" id="fDateFrom"></div>';
  html += '<div class="field" style="margin:0;"><label>Sana (gacha)</label><input type="date" class="input" id="fDateTo"></div>';
  html += '<div class="field" style="margin:0;"><label>Kadastr / Mijoz</label><input type="text" class="input" id="fSearch" placeholder="Qidirish..."></div>';
  document.getElementById('filtersContainer').innerHTML = html;
};

/** Tuman o'zgarsa — muhandislar ro'yxatini shu tumanga moslaydi. */
Apps.onDistrictChange = function () {
  var district = document.getElementById('fDistrict').value;
  var o = Apps._opts;
  var eSel = document.getElementById('fEngineer');
  var engs = o.engineers.filter(function (e) {
    return !district || e.district === district;
  });
  eSel.innerHTML = '<option value="">Muhandis (barchasi)</option>' +
    engs.map(function (e) { return '<option value="' + esc(e.name) + '">' + esc(e.name) + '</option>'; }).join('');
};

Apps._collectFilters = function () {
  function v(id) { var el = document.getElementById(id); return el ? el.value : ''; }
  return {
    district: v('fDistrict'), engineer: v('fEngineer'),
    applicationType: v('fType'), applicationPurpose: v('fPurpose'),
    lastProcessRole: v('fProcRole'), lastProcessName: v('fProcName'),
    residency: v('fResidency'), deadlineStatus: v('fDeadline'),
    paymentStatus: v('fPayment'), year: v('fYear'), dateFrom: v('fDateFrom'),
    dateTo: v('fDateTo'), search: v('fSearch')
  };
};

Apps.applyFilters = function () { Apps._page = 1; Apps.query(); };
Apps.resetFilters = function () {
  Apps._renderFilters(State.filterOptions); Apps._page = 1; Apps.query();
};


Apps.query = function () {
  var filters = Apps._collectFilters();
  filters.page = Apps._page;
  filters.pageSize = 50;
  Apps._filters = filters;
  App.progress(30);
  api('apiQueryTable', State.token, filters).then(function (res) {
    App.progress(100);
    Apps._render(res);
  }).catch(function (e) { App.toast(e.message, 'error'); App.progress(0); });
};

Apps._render = function (res) {
  App._setText('appsCount', 'Jami: ' + res.total + ' ta ariza (sahifa ' + res.page + '/' + res.pages + ')');
  var t = document.getElementById('appsTable');
  if (!res.rows.length) {
    t.querySelector('thead').innerHTML = '';
    t.querySelector('tbody').innerHTML = '<tr><td><div class="empty-state"><span class="material-icons">inbox</span><div>Ma\'lumot topilmadi</div></div></td></tr>';
    document.getElementById('appsPagination').innerHTML = '';
    return;
  }
  t.querySelector('thead').innerHTML = '<tr><th>Tranzaksiya</th><th>Muhandis</th>' +
    '<th>Tuman</th><th>Tur</th><th>Muddat</th><th>Holat</th><th>Summa</th><th>To\'lov</th><th></th></tr>';
  t.querySelector('tbody').innerHTML = res.rows.map(function (r) {
    return '<tr><td><strong>' + esc(r.transactionNo || r.applicationNo || r.cadastreNo) + '</strong></td>' +
      '<td>' + esc(r.engineer) + '</td><td>' + esc(r.district) + '</td>' +
      '<td>' + esc(r.residencyLabel) + '</td><td>' + esc(r.deadlineDate) + '</td>' +
      '<td><span class="badge" style="background:' + r.colorHex + '">' + esc(r.deadlineStatusLabel) + '</span></td>' +
      '<td>' + esc(r.amountFmt) + '</td>' +
      '<td><span class="badge" style="background:' + Apps._payColor(r.paymentStatus) + '">' + esc(r.paymentStatusLabel) + '</span></td>' +
      '<td><button class="btn-icon" onclick="Apps.showDetail(\'' + esc(r.rowId) + '\')"><span class="material-icons">visibility</span></button></td></tr>';
  }).join('');
  Apps._lastRows = res.rows;
  Apps._renderPagination(res);
};

Apps._payColor = function (s) {
  return { PAID: 'var(--md-success)', PARTIAL: 'var(--md-warning)',
    WAITING: 'var(--md-orange)', UNPAID: 'var(--md-danger)' }[s] || 'var(--md-secondary)';
};

Apps._renderPagination = function (res) {
  var html = '<button class="btn" ' + (res.page <= 1 ? 'disabled' : '') +
    ' onclick="Apps.goPage(' + (res.page - 1) + ')"><span class="material-icons">chevron_left</span></button>' +
    '<span>Sahifa ' + res.page + ' / ' + res.pages + '</span>' +
    '<button class="btn" ' + (res.page >= res.pages ? 'disabled' : '') +
    ' onclick="Apps.goPage(' + (res.page + 1) + ')"><span class="material-icons">chevron_right</span></button>';
  document.getElementById('appsPagination').innerHTML = html;
};

Apps.goPage = function (p) { Apps._page = p; Apps.query(); };


Apps.showDetail = function (rowId) {
  var rows = (Apps._lastRows || []).concat(window._searchCache || []);
  var r = null;
  for (var i = 0; i < rows.length; i++) { if (rows[i].rowId === rowId) { r = rows[i]; break; } }
  if (!r) { App.toast('Yozuv topilmadi', 'warning'); return; }
  function row(l, v) { return '<tr><th style="width:40%">' + esc(l) + '</th><td>' + esc(v) + '</td></tr>'; }
  var body = '<table class="data-table"><tbody>' +
    row('Ariza raqami', r.applicationNo) + row('Tranzaksiya', r.transactionNo) +
    row('Kadastr raqami', r.cadastreNo) + row('Arizadagi kadastr', r.arizaCadastreNo) +
    row('Mijoz', r.customer) + row('Mulkdor', r.owner) + row('Telefon', r.phone) +
    row('Tuman', r.district) + row('Mahalla', r.mahallaName) +
    row('Bosh muhandis', r.chiefEngineer) + row('Muhandis', r.engineer) + row('Registrator', r.registrator) +
    row('Ariza turi', r.applicationType) + row('Ariza maqsadi', r.applicationPurpose) +
    row('Obyekt turi', r.objectType) + row('Obyekt turi 2', r.objectType2) +
    row('Bo\'linish turi', r.objectSubdivision) + row('Ijtimoiy himoya', r.socialProtection) +
    row('Oxirgi jarayon roli', r.lastProcessRole) + row('Oxirgi jarayon nomi', r.lastProcessName) +
    row('Rad sababi', r.rejectReason) +
    row('Turar/Noturar', r.residencyLabel) + row('Qabul sanasi', r.registerDate) +
    row('Muddat', r.deadlineDate) + row('Bajarilgan', r.completeDate) +
    row('Muddat holati', r.deadlineStatusLabel) + row('Qolgan kun', r.remainingDays) +
    row('To\'lovga chiqarilgan', r.issuedDate) +
    row('Summa', r.amountFmt) +
    row('To\'langan', r.paidFmt) + row('Qarz', r.debtFmt) +
    row('To\'lov holati', r.paymentStatusLabel) + row('Izoh', r.note) +
    '</tbody></table>';
  App.showModal('Ariza tafsilotlari', body,
    '<button class="btn" onclick="App.closeModal(\'genericModal\')">Yopish</button>');

Apps.export = function (format) {
  App.toast(format.toUpperCase() + ' tayyorlanmoqda...', 'info');
  App.progress(40);
  var filters = Apps._collectFilters();
  api('apiExport', State.token, State.csrf, filters, format).then(function (res) {
    App.progress(100);
    Apps._download(res.base64, res.fileName, res.mimeType);
    App.toast(res.rows + ' qator eksport qilindi', 'success');
  }).catch(function (e) { App.toast(e.message, 'error'); App.progress(0); });
};

Apps._download = function (base64, fileName, mimeType) {
  var bin = atob(base64);
  var bytes = new Uint8Array(bin.length);
  for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  var blob = new Blob([bytes], { type: mimeType });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = fileName; document.body.appendChild(a); a.click();
  document.body.removeChild(a); setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
};

Apps.print = function () {
  App.progress(40);
  var filters = Apps._collectFilters();
  api('apiPrint', State.token, filters).then(function (res) {
    App.progress(100);
    var w = window.open('', '_blank');
    w.document.write('<html><head><title>DKP Arizalar</title><style>' +
      'table{width:100%;border-collapse:collapse;font-family:sans-serif;font-size:11px}' +
      'th,td{border:1px solid #999;padding:4px 6px;text-align:left}th{background:#eee}</style></head><body>' +
      '<h3>DKP Arizalar Nazorati — ' + res.rows + ' ta yozuv</h3>' + res.html + '</body></html>');
    w.document.close(); w.focus(); setTimeout(function () { w.print(); }, 500);
  }).catch(function (e) { App.toast(e.message, 'error'); App.progress(0); });
};

/**
 * To'lov jarayonidagi (kutilayotgan) arizalar — ariza egasiga qo'ng'iroq qilish uchun.
 * Guruhlashga qarab:
 *   - registrator kesimi  -> faqat REGISTRATSIYA to'lovi kutilayotgan arizalar;
 *   - muhandis kesimi      -> faqat KADASTR+MANZIL to'lovi kutilayotgan arizalar;
 *   - tuman (standart)     -> barcha kutilayotgan arizalar (umumiy summa).
 */
FinanceUI._renderPending = function (list, by) {
  list = list || [];
  var isReg = by === 'registrator';
  var isEng = by === 'engineer';
  var respLabel = isReg ? 'Registrator' : 'Muhandis';

  var filtered = list.filter(function (p) {
    if (isReg) return (p.registratorPending || 0) > 0;
    if (isEng) return (p.engineerPending || 0) > 0;
    return true;
  });

  var cnt = document.getElementById('pendingCount');
  if (cnt) cnt.textContent = 'To\'lov kutilayotgan ' + filtered.length + ' ta ariza — qo\'ng\'iroq ro\'yxati' +
    (isReg ? ' (registratsiya to\'lovi)' : isEng ? ' (kadastr + manzil to\'lovi)' : '');

  var columns = [
    { label: 'Tranzaksiya' }, { label: 'Kadastr raqami' }, { label: 'Ariza manbasi' },
    { label: 'Buyurtmachi' }, { label: 'Mulkdor' },
    { label: 'Telefon', html: true }, { label: 'Tuman' }, { label: respLabel },
    { label: 'To\'lanishi lozim (so\'m)' }, { label: 'Muddat' }
  ];
  var rows = filtered.map(function (p) {
    var phone = String(p.phone || '').trim();
    var tel = phone ? '<a href="tel:' + esc(phone.replace(/[^0-9+]/g, '')) + '">' +
      '<span class="material-icons" style="font-size:15px;vertical-align:middle">call</span> ' + esc(phone) + '</a>' : '—';
    var resp = isReg ? (p.registrator || '—') : (p.engineer || '—');
    var amt = isReg ? p.registratorPending : isEng ? p.engineerPending : p.pendingAmount;
    return [
      p.transactionNo || p.applicationNo, p.cadastreNo || '—', p.applicationSource || '—',
      p.customer || '—', p.owner || '—', tel,
      p.district, resp, FinanceUI._money(amt), p.deadlineDate || '—'
    ];
  });
  Grid.render('pendingTable', columns, rows, { exportName: 'tolov_jarayonida' });
};

      '/' + esc(info.totalRows) + ' · Davomiyligi: ' + Math.round((info.durationMs || 0) / 1000) + ' s';
  }).catch(function (e) {
    var box = document.getElementById('lastImportInfo');

  });
};

ImportUI._selectedFile = null;

/** Fayl tanlanganda — SheetJS bilan brauzerda 2D jadvalga o'qiydi. */
ImportUI.onFileSelected = function (input) {
  var btn = document.getElementById('importFileBtn');
  var nameEl = document.getElementById('importFileName');
  ImportUI._selectedFile = null;
  btn.disabled = true;
  if (!input.files || !input.files.length) { nameEl.textContent = ''; return; }

  var file = input.files[0];
  var maxMb = 25;
  if (file.size > maxMb * 1024 * 1024) {
    App.toast('Fayl hajmi ' + maxMb + ' MB dan oshmasligi kerak', 'error');
    input.value = ''; return;
  }
  if (typeof XLSX === 'undefined') {
    App.toast('Excel kutubxonasi yuklanmadi. Internetni tekshiring va sahifani yangilang.', 'error');
    return;
  }
  nameEl.textContent = file.name + ' — o\'qilmoqda...';
  var reader = new FileReader();
  reader.onload = function (e) {
    try {
      var wb = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
      var firstSheet = wb.Sheets[wb.SheetNames[0]];
      var matrix = XLSX.utils.sheet_to_json(firstSheet, { header: 1, raw: false, defval: '' });
      // Oxiridagi to'liq bo'sh qatorlarni olib tashlash.
      while (matrix.length && matrix[matrix.length - 1].every(function (c) { return c === '' || c == null; })) {
        matrix.pop();
      }
      if (matrix.length < 2) { throw new Error('Faylda yetarli ma\'lumot yo\'q (sarlavha + qatorlar).'); }
      ImportUI._selectedFile = { rows: matrix, fileName: file.name };
      nameEl.textContent = file.name + ' — ' + (matrix.length - 1) + ' qator tayyor';
      btn.disabled = false;
    } catch (err) {
      App.toast('Faylni o\'qishda xato: ' + err.message, 'error');
      nameEl.textContent = file.name + ' — xato';
    }
  };
  reader.onerror = function () { App.toast('Faylni o\'qishda xato', 'error'); };
  reader.readAsArrayBuffer(file);
};

/** Tanlangan jadvalni serverga yuborib, import qiladi. */
ImportUI.uploadAndImport = function () {
  if (!ImportUI._selectedFile) { App.toast('Avval fayl tanlang', 'warning'); return; }
  var btn = document.getElementById('importFileBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="material-icons" style="animation:spin 0.8s linear infinite">autorenew</span> Import qilinmoqda...';
  ImportUI._showProgress(10);

      Dash.load(true); ImportUI.init();

      ImportUI._selectedFile = null;

      App.toast('Import xatosi: ' + rep.error, 'error');

ImportUI.run = function () {

      Dash.load(true); ImportUI.init();

    }
  }).catch(function (e) { App.toast(e.message, 'error'); App.progress(0); })
    .then(function () {
      btn.disabled = false;
      btn.innerHTML = '<span class="material-icons">play_arrow</span> HISOBOT\'dan import';

ImportUI._showProgress = function (startPct) {
  document.getElementById('importProgress').classList.remove('hidden');
  document.getElementById('importBar').style.width = startPct + '%';
  App.progress(startPct + 10);
};

ImportUI._renderReport = function (rep) {
  document.getElementById('importBar').style.width = '100%';
  App.progress(100);
  var html = '';
  var steps = (rep.steps || []).map(function (s) {
    var color = s.status === 'OK' ? 'var(--md-success)' : s.status === 'ERROR' ? 'var(--md-danger)' : 'var(--text-secondary)';
    return '<div style="color:' + color + '">• ' + esc(s.name) + ': ' + esc(s.status) +
      (s.detail ? ' — ' + esc(s.detail) : '') + '</div>';
  }).join('');
  html += steps;

  if (rep.totalAmount != null) {
    html += '<div style="margin-top:10px; padding:8px 10px; background:var(--bg-surface-2); border-radius:6px; font-weight:600">' +
      'Hisoblangan: Jami summa ' + Number(rep.totalAmount).toLocaleString('ru-RU') + ' so\'m · ' +
      'To\'langan ' + Number(rep.totalPaid || 0).toLocaleString('ru-RU') + ' so\'m</div>';
  }
  if (rep.readbackAmount != null) {
    var warn = (rep.readbackAmount === 0 && rep.totalAmount > 0);
    html += '<div style="margin-top:6px; padding:8px 10px; border-radius:6px; font-weight:600; background:' +
      (warn ? 'var(--md-danger); color:#fff' : 'var(--bg-surface-2)') + '">' +
      'DATA\'dan o\'qildi (dashboard ko\'radigan): ' + (rep.readbackRows || 0) + ' qator · Jami ' +
      Number(rep.readbackAmount).toLocaleString('ru-RU') + ' so\'m · To\'langan ' +
      Number(rep.readbackPaid || 0).toLocaleString('ru-RU') + ' so\'m' +
      (warn ? ' ⚠️ O\'qishda 0 — muammo o\'qish yo\'lida!' : '') + '</div>';
  }
  if (rep.dataRawAmount != null) {
    html += '<div style="margin-top:6px; padding:8px 10px; border-radius:6px; font-size:12px; background:var(--bg-surface-2)">' +
      'DATA xom o\'qish: ustunlar=' + rep.dataCols + ', amount-ustun-indeksi=' + rep.dataAmountIdx +
      ', xom-jami=' + Number(rep.dataRawAmount).toLocaleString('ru-RU') + ' so\'m' +
      (rep.dataRawAmount > 0 && rep.readbackAmount === 0
        ? ' — DATA\'da summa BOR, lekin o\'qish funksiyasi 0 beryapti!'
        : (rep.dataRawAmount === 0 ? ' — DATA varag\'ining amount ustuni BO\'SH (yozishda muammo)!' : '')) +
      '</div>';
  }
  if (rep.detectedColumns && rep.detectedColumns.length) {
    html += '<div style="margin-top:10px"><strong>Tanilgan ustunlar (' +
      rep.detectedColumns.length + '):</strong><br><small style="color:var(--text-secondary)">' +
      rep.detectedColumns.map(esc).join(' · ') + '</small></div>';
  }
  if (rep.unmappedHeaders && rep.unmappedHeaders.length) {
    html += '<div style="margin-top:8px"><small style="color:var(--text-disabled)">Ishlatilmagan ustunlar: ' +
      rep.unmappedHeaders.length + ' ta</small></div>';
  }
  if (rep.warnings && rep.warnings.length) {
    html += '<div style="margin-top:8px; color:var(--md-warning)"><strong>Ogohlantirishlar:</strong><br><small>' +
      rep.warnings.slice(0, 10).map(esc).join('<br>') + '</small></div>';
  }
  document.getElementById('importSteps').innerHTML = html;
};

/** Rol/tuman tanlanganda — mos xodimlar (bosh yoki kadastr muhandis) ro'yxatini to'ldiradi. */
UsersUI._refreshPersons = function () {
  var role = (document.getElementById('nuRole') || {}).value;
  var district = (document.getElementById('nuDistrict') || {}).value;
  var sel = document.getElementById('nuPerson');
  if (!sel || !UsersUI._opts) return;
  if (role === 'ADMIN') {
    sel.innerHTML = '<option value="">\u2014 admin uchun shart emas \u2014</option>';
    sel.disabled = true; return;
  }
  sel.disabled = false;
  if (!district) { sel.innerHTML = '<option value="">\u2014 avval tumanni tanlang \u2014</option>'; return; }
  var list = (role === 'CHIEF') ? (UsersUI._opts.chiefEngineers || []) : (UsersUI._opts.engineers || []);
  list = list.filter(function (p) { return p.district === district; });
  if (!list.length) {
    sel.innerHTML = '<option value="">\u2014 bu tumanda topilmadi (qo\'lda Login kiriting) \u2014</option>';
    return;
  }
  sel.innerHTML = '<option value="">\u2014 tanlang \u2014</option>' +
    list.map(function (p) { return '<option value="' + esc(p.name) + '">' + esc(p.name) + '</option>'; }).join('');
};

/** Ismdan login taklif qiladi. */
UsersUI._slug = function (name) {
  return String(name || '').toLowerCase()
    .replace(/['\u2018\u2019`\u02bb\u02bc]/g, '')
    .replace(/[^a-z0-9]+/g, '.')
    .replace(/^\.+|\.+$/g, '').slice(0, 28);
};

UsersUI._onPerson = function () {
  var name = document.getElementById('nuPerson').value;
  var u = document.getElementById('nuUsername');
  if (name && u && !u.value.trim()) u.value = UsersUI._slug(name);
};

UsersUI.create = function () {

  var data = {
    username: v('nuUsername'), password: v('nuPassword'), role: v('nuRole'),
    district: v('nuDistrict'), fullName: v('nuPerson'), employeeId: v('nuEmployeeId')
  };

    App.closeModal('genericModal');

    if (res.generatedPassword) msg += ' Parol: ' + res.generatedPassword;

};

/** Admin foydalanuvchiga aniq parol beradi/o'zgartiradi. */
UsersUI.setPassword = function (username) {
  var pwd = prompt('"' + username + '" uchun yangi parol (kamida 8 belgi, harf + raqam):', '');
  if (pwd === null) return;

    App.toast('Parol o\'rnatildi: ' + pwd, 'success');

  }).catch(function (e) { App.toast(e.message, 'error'); });

UsersUI.reset = function (username) {

/* ---- Muddat hisoblash formulasi (sozlanadigan qiymatlar) ---- */
DeadlineUI._cfg = [];
DeadlineUI._groupLabel = {
  'manba': 'Ariza manbasi bo\'yicha',
  'flag': 'Kadastr passport olish turi (bayroq)',
  'ariza': 'Ariza turi bo\'yicha (aniq moslik)',
  'turar': 'Turar obyekt / kompozit',
  'noturar': 'Noturar obyekt / kompozit',
  'umumiy': 'Umumiy foydalanishdagi ko\'chmas mulk',
  'maydon': 'Maydon (m\u00b2) jadvali \u2014 noturar',
  'default': 'Standart (qolgan barcha hollar)'
};
DeadlineUI._groupOrder = ['manba', 'flag', 'ariza', 'turar', 'noturar', 'umumiy', 'maydon', 'default'];

DeadlineUI._groupOf = function (key) {
  var i = key.indexOf(':');
  return i === -1 ? key : key.substring(0, i);
};

DeadlineUI._renderConfig = function (list) {
  DeadlineUI._cfg = list || [];
  var wrap = document.getElementById('deadlineConfigWrap');
  if (!wrap) return;
  if (!DeadlineUI._cfg.length) {
    wrap.innerHTML = '<div class="empty-state" style="padding:24px">Qoidalar yo\'q</div>';
    return;
  }
  var groups = {};
  DeadlineUI._cfg.forEach(function (it, idx) {
    var g = DeadlineUI._groupOf(it.key);
    (groups[g] = groups[g] || []).push({ it: it, idx: idx });
  });
  var html = '';
  DeadlineUI._groupOrder.forEach(function (g) {
    if (!groups[g]) return;
    html += '<div style="margin-bottom:14px;">' +
      '<div style="font-weight:600; margin:8px 0; color:var(--text-primary);">' +
      esc(DeadlineUI._groupLabel[g] || g) + '</div>' +
      '<table class="data-table"><tbody>';
    groups[g].forEach(function (o) {
      var it = o.it, i = o.idx;
      var label = it.desc || it.key;
      html += '<tr>' +
        '<td style="width:58%">' + esc(label) +
        '<div style="color:var(--text-secondary);font-size:11px">' + esc(it.key) + '</div></td>' +
        '<td style="width:120px"><input type="number" class="input" id="dcVal_' + i +
        '" value="' + it.value + '" min="0" max="365" style="width:90px"></td>' +
        '<td><button class="btn-icon" title="Saqlash" onclick="DeadlineUI.saveParam(' + i +
        ')"><span class="material-icons">save</span></button>' +
        (it.fixed ? '' : '<button class="btn-icon" title="O\'chirish" onclick="DeadlineUI.deleteParam(' + i +
          ')"><span class="material-icons" style="color:var(--md-danger)">delete</span></button>') +
        '</td></tr>';
    });
    html += '</tbody></table></div>';
  });
  wrap.innerHTML = html;
};

DeadlineUI.saveParam = function (i) {
  var it = DeadlineUI._cfg[i]; if (!it) return;
  var v = document.getElementById('dcVal_' + i).value;
  if (v === '') { App.toast('Kun sonini kiriting', 'warning'); return; }
  api('apiSaveDeadlineParam', State.token, State.csrf, { key: it.key, value: v, desc: it.desc })
    .then(function () { App.toast('Saqlandi', 'success'); DeadlineUI.load(); })

};

    name: document.getElementById('holidayName').value.trim()
  };
  if (!holiday.date) { App.toast('Sanani tanlang', 'warning'); return; }
  api('apiAddHoliday', State.token, State.csrf, holiday).then(function () {
    App.toast('Bayram kuni qo\'shildi', 'success');
    document.getElementById('holidayDate').value = '';
    document.getElementById('holidayName').value = '';
    DeadlineUI.load();
  }).catch(function (e) { App.toast(e.message, 'error'); });
};

DeadlineUI.deleteHoliday = function (date) {
  if (!confirm('Bu bayram kunini o\'chirasizmi?')) return;
  api('apiDeleteHoliday', State.token, State.csrf, date).then(function () {
    App.toast('Bayram kuni o\'chirildi', 'success'); DeadlineUI.load();
  }).catch(function (e) { App.toast(e.message, 'error'); });
};

</script>
