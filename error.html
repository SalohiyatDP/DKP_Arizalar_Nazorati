<!DOCTYPE html>
<html lang="uz">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xato</title>
  <style>
    body { font-family: 'Roboto', system-ui, sans-serif; background: #f1f3f4; color: #202124;
      display: flex; min-height: 100vh; align-items: center; justify-content: center; margin: 0; padding: 16px; }
    .err-card { background: #fff; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      max-width: 480px; padding: 40px; text-align: center; }
    .err-icon { font-size: 56px; color: #c62828; }
    h1 { font-size: 22px; margin: 16px 0 8px; }
    p { color: #5f6368; line-height: 1.6; }
    .err-detail { background: #fce8e6; color: #c5221f; padding: 12px; border-radius: 8px;
      margin-top: 16px; font-family: monospace; font-size: 13px; word-break: break-word; }
    a { display: inline-block; margin-top: 20px; color: #1a73e8; font-weight: 500; }
  </style>
</head>
<body>
  <div class="err-card">
    <div class="err-icon">&#9888;</div>
    <h1>Tizimda xatolik yuz berdi</h1>
    <p> Kechirasiz, so'rovni bajarishda muammo yuzaga keldi. Iltimos sahifani yangilang yoki administratorga murojaat qiling.</p>
    <div class="err-detail"><?= message ?></div>
    <a href="javascript:location.reload()">Sahifani qayta yuklash</a>
  </div>
</body>
</html>
